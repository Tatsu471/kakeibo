name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main  # mainブランチへのpushで自動実行

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリのコードを取得
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Flutter環境をセットアップ
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      # 3. パッケージをインストール
      - name: Install dependencies
        run: flutter pub get

      # 4. firebase_options.dart を Secrets から復元
      - name: Restore firebase_options.dart
        run: |
          cat <<'EOF' > lib/firebase_options.dart
          ${{ secrets.FIREBASE_OPTIONS_DART }}
          EOF

      # 5. 本番ビルド
      - name: Build Flutter Web
        run: flutter build web --release

      # 6. Firebase Hosting へデプロイ
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KAKEIBO_9B5FA }}
          channelId: live
          projectId: kakeibo-9b5fa
